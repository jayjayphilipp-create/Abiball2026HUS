<meta charset="UTF-8">

<title>🎓 Abiball Einlass 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #f0ede8; min-height: 100vh; }
  #header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 1px solid #2a2a3e;
    padding: 14px 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .title { font-size: 19px; font-weight: 700; }
  .sync-status { font-size: 11px; color: #7c7c9a; margin-top: 2px; }
  .counter { text-align: right; }
  .counter-num { font-size: 26px; font-weight: 800; color: #a78bfa; line-height: 1; }
  .counter-label { font-size: 11px; color: #7c7c9a; }
  .progress-bar { height: 5px; background: #2a2a3e; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 3px; transition: width 0.4s; }
  #search {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1px solid #2a2a3e; background: #1a1a2e; color: #f0ede8;
    font-size: 16px; outline: none; margin-bottom: 10px;
  }
  .tabs { display: flex; gap: 6px; }
  .tab {
    flex: 1; padding: 7px 0; border-radius: 8px; border: none;
    cursor: pointer; font-size: 12px; font-weight: 600;
    background: #1a1a2e; color: #7c7c9a; transition: all 0.2s;
  }
  .tab.active { background: #7c3aed; color: #fff; }
  #list { max-width: 600px; margin: 0 auto; padding: 12px 14px 80px; }
  .guest-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; margin-bottom: 7px; border-radius: 12px;
    background: #1a1a2e; border: 1px solid #2a2a3e;
    cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
  }
  .guest-card.checked { background: rgba(124,58,237,0.15); border-color: rgba(167,139,250,0.4); }
  .guest-info { flex: 1; min-width: 0; }
  .guest-name { font-size: 16px; font-weight: 600; color: #f0ede8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .guest-card.checked .guest-name { text-decoration: line-through; color: #7c7c9a; }
  .guest-meta { display: flex; gap: 7px; margin-top: 3px; align-items: center; flex-wrap: wrap; }
  .guest-group { font-size: 11px; color: #5a5a7a; background: #2a2a3e; padding: 1px 7px; border-radius: 6px; }
  .guest-tickets { font-size: 11px; color: #a78bfa; }
  .guest-time { font-size: 11px; color: #7c7c9a; }
  .check-circle {
    width: 32px; height: 32px; border-radius: 50%;
    background: #2a2a3e; display: flex; align-items: center;
    justify-content: center; font-size: 16px; flex-shrink: 0;
    margin-left: 10px; color: #fff; font-weight: 700;
  }
  .guest-card.checked .check-circle { background: #7c3aed; }
  .empty { text-align: center; padding: 40px; color: #7c7c9a; }
  #debug { font-size: 11px; color: #ff6b6b; text-align: center; padding: 8px; display: none; }
  .mini-progress { height: 3px; background: #2a2a3e; border-radius: 2px; overflow: hidden; margin-top: 5px; width: 100%; }
  .mini-progress-fill { height: 100%; background: #a78bfa; border-radius: 2px; transition: width 0.2s; }
  #hint { max-width: 600px; margin: 0 auto; padding: 0 16px 10px; font-size: 11px; color: #5a5a7a; text-align: center; }
</style>

let state = {};
let currentView = 'all';
let pressTimer = null;
let longPressTriggered = false;

function toKey(name) {
  return encodeURIComponent(name).replace(/%/g, '_');
}

function maxTickets(g) {
  // Leute ohne Ticketzahl (Lehrer etc.) zählen als 1 Einlass
  return g.tickets == null ? 1 : g.tickets;
}

const DB_URL = "https://abiabll2026-default-rtdb.firebaseio.com/checkin";

// Load state from Firebase REST API
async function loadState() {
  try {
    const res = await fetch(DB_URL + ".json");
    const data = await res.json();
    state = data || {};
    document.getElementById('sync-status').textContent = "✓ Live synchronisiert";
    render();
  } catch(e) {
    document.getElementById('sync-status').textContent = "⚠ Verbindungsfehler";
    document.getElementById('sync-status').className = 'sync-status error';
    render();
  }
}

// Poll every 3 seconds
loadState();
setInterval(loadState, 3000);

async function saveEntry(key, newVal) {
  state[key] = newVal;
  render();
  try {
    await fetch(DB_URL + "/" + key + ".json", {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newVal)
    });
  } catch(e) {
    console.error('Sync error', e);
  }
}

// Klick: ein Ticket einlassen. Bei 0 verbleibenden Tickets -> Person komplett "anwesend"
async function checkIn(name) {
  const g = GUESTS.find(x => x.name === name);
  if (!g) return;
  const key = toKey(name);
  const current = state[key] || { checked: false, remaining: maxTickets(g), time: null };
  const total = maxTickets(g);
  let remaining = current.remaining != null ? current.remaining : total;

  if (current.checked) return; // schon komplett abgehakt

  remaining = Math.max(0, remaining - 1);
  const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  const checked = remaining === 0;
  const newVal = { checked: checked, remaining: remaining, time: now };
  await saveEntry(key, newVal);
}

// Langer Druck / Rechtsklick: ein Ticket zurückgeben (rückgängig)
async function checkOut(name) {
  const g = GUESTS.find(x => x.name === name);
  if (!g) return;
  const key = toKey(name);
  const total = maxTickets(g);
  const current = state[key] || { checked: false, remaining: total, time: null };
  let remaining = current.remaining != null ? current.remaining : total;

  if (remaining >= total) return; // nichts zum Rückgängigmachen

  remaining = Math.min(total, remaining + 1);
  const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  const newVal = { checked: false, remaining: remaining, time: remaining < total ? now : null };
  await saveEntry(key, newVal);
}

function handlePressStart(name, evt) {
  longPressTriggered = false;
  pressTimer = setTimeout(() => {
    longPressTriggered = true;
    if (navigator.vibrate) navigator.vibrate(40);
    checkOut(name);
  }, 550);
}

function handlePressEnd(name) {
  clearTimeout(pressTimer);
  if (!longPressTriggered) {
    checkIn(name);
  }
}

function handlePressCancel() {
  clearTimeout(pressTimer);
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = GUESTS.filter(g => {
    const matchSearch = g.name.toLowerCase().includes(search);
    const key = toKey(g.name);
    const checked = state[key] && state[key].checked;
    if (currentView === 'checked') return matchSearch && checked;
    if (currentView === 'unchecked') return matchSearch && !checked;
    return matchSearch;
  });

  const checkedCount = GUESTS.filter(g => state[toKey(g.name)] && state[toKey(g.name)].checked).length;
  const total = GUESTS.length;

  document.getElementById('counter-num').textContent = checkedCount;
  document.getElementById('counter-label').textContent = "von " + total + " da";
  document.getElementById('progress-fill').style.width = (checkedCount / total * 100) + "%";

  const list = document.getElementById('list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Kein Eintrag gefunden.</div>';
    return;
  }

  list.innerHTML = filtered.map(g => {
    const key = toKey(g.name);
    const entry = state[key] || {};
    const checked = entry.checked || false;
    const total = maxTickets(g);
    const remaining = entry.remaining != null ? entry.remaining : total;
    const arrived = total - remaining;
    const safeName = g.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    const ticketLabel = g.tickets != null
      ? (checked
          ? '🎟 alle ' + total + ' da'
          : '🎟 ' + remaining + ' von ' + total + ' offen' + (arrived > 0 ? ' (' + arrived + ' eingelassen)' : ''))
      : '';
    return '<div class="guest-card ' + (checked ? 'checked' : '') + '" ' +
      'onmousedown="handlePressStart(\'' + safeName + '\')" ' +
      'onmouseup="handlePressEnd(\'' + safeName + '\')" ' +
      'onmouseleave="handlePressCancel()" ' +
      'ontouchstart="handlePressStart(\'' + safeName + '\')" ' +
      'ontouchend="handlePressEnd(\'' + safeName + '\')" ' +
      'ontouchcancel="handlePressCancel()" ' +
      'oncontextmenu="event.preventDefault(); checkOut(\'' + safeName + '\'); return false;">' +
      '<div class="guest-info">' +
        '<div class="guest-name">' + g.name + '</div>' +
        '<div class="guest-meta">' +
          (g.group ? '<span class="guest-group">' + g.group + '</span>' : '') +
          (ticketLabel ? '<span class="guest-tickets">' + ticketLabel + '</span>' : '') +
          (checked && entry.time ? '<span class="guest-time">· ' + entry.time + ' Uhr</span>' : '') +
        '</div>' +
        (g.tickets != null && total > 1 ? '<div class="mini-progress"><div class="mini-progress-fill" style="width:' + (arrived / total * 100) + '%"></div></div>' : '') +
      '</div>' +
      '<div class="check-circle">' + (checked ? '✓' : '') + '</div>' +
    '</div>';
  }).join('');
}
